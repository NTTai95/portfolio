spring.application.name=Freelancer

# Cấu hình kết nối cơ sở dữ liệu SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebsiteFreelancer;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cấu hình Dialect của SQL Server cho Hibernate
spring.jpa.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Hibernate DDL Auto: Tạo/kiểm tra bảng CSDL
spring.jpa.hibernate.ddl-auto=update

# Cấu hình Hibernate Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# Hiển thị câu lệnh SQL khi thực hiện
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

